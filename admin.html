<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNFA (Varthur) - Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#1a237e,#283593);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}.container{background:#fff;border-radius:2rem;padding:2rem;max-width:600px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.5);border:3px solid #d4af37}h1{text-align:center;color:#1a237e;font-size:1.5rem}h2{text-align:center;color:#ff6f00;font-size:.9rem;border-bottom:2px dashed #d4af37;padding-bottom:.5rem;margin-bottom:1.5rem}.section{background:#f9f9f9;border-radius:1rem;padding:1.2rem;margin-bottom:1rem;border:1px solid #ddd}h3{color:#1a237e;margin-bottom:.8rem}.upload-circle{width:120px;height:120px;border-radius:50%;border:4px solid #d4af37;margin:0 auto 1rem;background:#1a237e;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}.upload-circle img{width:100%;height:100%;object-fit:cover}.upload-circle span{font-size:3rem;color:#d4af37}.upload-hint{position:absolute;bottom:2px;right:2px;background:#d4af37;color:#1a237e;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid #1a237e}.scanner-box{border:2px dashed #d4af37;border-radius:1rem;padding:1.5rem;text-align:center;background:#fffef7;cursor:pointer;margin:0 auto 1rem}.scanner-preview{display:none}.scanner-preview img{max-width:100%;max-height:200px;border-radius:.5rem;border:2px solid #25D366}.btn{padding:.6rem 1.2rem;border-radius:2rem;border:none;cursor:pointer;font-weight:700;font-size:.8rem;margin:.2rem}.btn-gold{background:#d4af37;color:#1a237e}.btn-green{background:#25D366;color:#fff}.btn-red{background:#c41e3a;color:#fff}.btn-blue{background:#2196F3;color:#fff}.btn-center{text-align:center;margin-top:.5rem}.msg{background:#e8f5e9;color:#2e7d32;padding:.7rem;border-radius:1rem;text-align:center;font-weight:600;display:none;margin-top:.5rem;font-size:.85rem}.msg.show{display:block}.row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid #eee;font-size:.8rem}input[type=text]{width:100%;padding:.7rem 1rem;border:2px solid #ddd;border-radius:1.5rem;font-size:.85rem;margin-top:.3rem}input:focus{border-color:#d4af37;outline:none}label{font-weight:600;color:#333;font-size:.8rem;display:block;margin-top:.5rem}.link-box{background:#1a237e;color:#00ff41;padding:.7rem;border-radius:1rem;text-align:center;font-family:'Courier New',monospace;word-break:break-all;font-size:.75rem}
    </style>
</head>
<body>
<div class="container"><h1>⚽ YNFA (VARTHUR)</h1><h2>🔧 Admin Panel</h2>
    <div class="section"><h3>🖼️ Logo</h3><div class="upload-circle" onclick="document.getElementById('li').click()"><span id="lp">⚽</span><img id="lv" src="" style="display:none"><div class="upload-hint">📷</div></div><input type="file" id="li" accept="image/*" style="display:none" onchange="pl(event)"><div class="btn-center"><button class="btn btn-green" onclick="sl()">💾 Save</button><button class="btn btn-red" onclick="rl()">🔄 Remove</button></div><div class="msg" id="lm">✅ Saved!</div></div>
    <div class="section"><h3>📷 Scanner</h3><div class="scanner-box" id="sb" onclick="document.getElementById('si').click()"><div id="sp"><span style="font-size:2.5rem">📱</span><p style="font-weight:600">Click to Upload</p><button type="button" class="btn btn-blue">📁 Choose</button></div><input type="file" id="si" accept="image/*" style="display:none" onchange="ps(event)"><div class="scanner-preview" id="sv"><img id="svi" src=""><p id="sfn" style="font-size:.8rem;color:#2e7d32;font-weight:600;margin-top:.3rem"></p><button class="btn btn-gold" onclick="event.stopPropagation();document.getElementById('si').click()">🔄</button><button class="btn btn-red" onclick="event.stopPropagation();rs()">✕</button></div></div><div class="btn-center"><button class="btn btn-green" onclick="ss()">💾 Save</button><button class="btn btn-red" onclick="rs()">🔄 Remove</button></div><div class="msg" id="sm">✅ Saved!</div></div>
    <div class="section"><h3>⚙️ Settings</h3><label>UPI ID:</label><input type="text" id="upi" value="0798121A0079936.BQR@kotak"><label>Phone:</label><input type="text" id="ph" value="+91-9606743437"><label>Email:</label><input type="text" id="em" value="ynsportsforexcellence@gmail.com"><label>Address:</label><input type="text" id="ad" value="Varthur, Bangalore - 560087"><div class="btn-center"><button class="btn btn-blue" onclick="sav()">💾 Save</button></div><div class="msg" id="stm">✅ Saved!</div></div>
    <div class="section"><h3>👕 Jersey</h3><div class="row"><span>New:</span><span style="color:#c41e3a;font-weight:700">Mandatory ₹1000</span></div><div class="row"><span>Old:</span><label style="display:flex;align-items:center;gap:.3rem;margin:0"><input type="checkbox" id="oj" checked onchange="sj()"><span style="color:#2e7d32;font-weight:700">Optional</span></label></div></div>
    <div class="section"><h3>🔗 Link</h3><div class="link-box" id="fl">https://jeyabalp1983.github.io/ynfa-varthur-registration/</div><div class="btn-center"><button class="btn btn-gold" onclick="navigator.clipboard.writeText(document.getElementById('fl').textContent.trim()).then(()=>alert('✅ Copied!'))">📋 Copy</button></div></div>
</div>
<script>
window.onload=function(){const l=localStorage.getItem('ynfaVLogo');if(l){document.getElementById('lv').src=l;document.getElementById('lv').style.display='block';document.getElementById('lp').style.display='none'}const s=localStorage.getItem('ynfaVScanner');if(s){document.getElementById('svi').src=s;document.getElementById('sfn').textContent='✅ Scanner';document.getElementById('sv').style.display='block';document.getElementById('sp').style.display='none'}const t=JSON.parse(localStorage.getItem('ynfaVSettings')||'{}');if(t.upiId)document.getElementById('upi').value=t.upiId;if(t.phone)document.getElementById('ph').value=t.phone;if(t.email)document.getElementById('em').value=t.email;if(t.address)document.getElementById('ad').value=t.address;if(t.oldJerseyOptional!==undefined)document.getElementById('oj').checked=t.oldJerseyOptional};
function pl(e){const f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){alert('Max 2MB!');return}const r=new FileReader();r.onload=function(ev){document.getElementById('lv').src=ev.target.result;document.getElementById('lv').style.display='block';document.getElementById('lp').style.display='none'};r.readAsDataURL(f)}
function sl(){const i=document.getElementById('lv');if(!i.src||i.style.display==='none'){alert('Choose logo!');return}localStorage.setItem('ynfaVLogo',i.src);const m=document.getElementById('lm');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),3000)}
function rl(){localStorage.removeItem('ynfaVLogo');document.getElementById('lv').src='';document.getElementById('lv').style.display='none';document.getElementById('lp').style.display='block';document.getElementById('li').value=''}
function ps(e){e.stopPropagation();const f=e.target.files[0];if(!f)return;if(!['image/jpeg','image/png','image/webp'].includes(f.type)){alert('JPG/PNG/WebP!');return}if(f.size>5*1024*1024){alert('Max 5MB!');return}const r=new FileReader();r.onload=function(ev){document.getElementById('svi').src=ev.target.result;document.getElementById('sfn').textContent='✅ '+f.name;document.getElementById('sv').style.display='block';document.getElementById('sp').style.display='none'};r.readAsDataURL(f)}
function ss(){const i=document.getElementById('svi');if(!i.src||document.getElementById('sv').style.display==='none'){alert('Upload first!');return}localStorage.setItem('ynfaVScanner',i.src);const m=document.getElementById('sm');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),3000)}
function rs(){localStorage.removeItem('ynfaVScanner');document.getElementById('svi').src='';document.getElementById('sv').style.display='none';document.getElementById('sp').style.display='block';document.getElementById('si').value=''}
function sav(){const t={upiId:document.getElementById('upi').value,phone:document.getElementById('ph').value,email:document.getElementById('em').value,address:document.getElementById('ad').value,oldJerseyOptional:document.getElementById('oj').checked};localStorage.setItem('ynfaVSettings',JSON.stringify(t));const m=document.getElementById('stm');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),3000)}
function sj(){const t=JSON.parse(localStorage.getItem('ynfaVSettings')||'{}');t.oldJerseyOptional=document.getElementById('oj').checked;localStorage.setItem('ynfaVSettings',JSON.stringify(t))}
</script>
</body>
</html>
